<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveLink 💜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a2e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 { color: #c084fc; font-size: 2rem; margin-bottom: 10px; }
    p { color: #a78bfa; margin-bottom: 50px; }
    .heart {
      font-size: 100px;
      cursor: pointer;
      animation: beat 1.2s infinite;
      filter: drop-shadow(0 0 20px #c084fc);
      user-select: none;
    }
    .heart:active { transform: scale(0.85); }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .message {
      margin-top: 30px;
      color: #c084fc;
      font-size: 1.2rem;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .message.show { opacity: 1; }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .je-taime {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 3rem;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 0 30px #c084fc, 0 0 60px #c084fc;
      z-index: 20;
      transition: transform 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
    }
    .je-taime.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>💜 LoveLink</h1>
  <p>Notre espace rien qu'à nous...</p>
  <div class="heart" onclick="sendLove()">💜</div>
  <div class="message" id="msg">Amour envoyé ! 💜</div>

  <canvas id="fireworks"></canvas>
  <div class="je-taime" id="jetaime">Je t'aime 💜</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA238mxb8N8ejOYy7gwKQIJrhyoMgREhVo",
      authDomain: "lovelink-8d181.firebaseapp.com",
      projectId: "lovelink-8d181",
      storageBucket: "lovelink-8d181.firebasestorage.app",
      messagingSenderId: "344489492288",
      appId: "1:344489492288:web:6c655b33b3f363e15784a5",
      databaseURL: "https://lovelink-8d181-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Feux d'artifice
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function launchFirework() {
      const colors = ['#c084fc', '#f472b6', '#fff', '#fbbf24', '#60a5fa'];
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.6;
      for (let i = 0; i < 80; i++) {
        const angle = (Math.PI * 2 / 80) * i;
        const speed = Math.random() * 6 + 2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 3 + 1
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.alpha > 0.01);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.alpha -= 0.02;
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      if (particles.length > 0) requestAnimationFrame(animateFireworks);
    }

    function showCelebration() {
      if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
      const jetaime = document.getElementById('jetaime');
      jetaime.classList.add('show');
      for (let i = 0; i < 5; i++) {
        setTimeout(launchFirework, i * 300);
      }
      animateFireworks();
      setTimeout(() => jetaime.classList.remove('show'), 3000);
    }

    window.sendLove = function() {
      const msg = document.getElementById('msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
      set(ref(db, 'heart'), {
        timestamp: Date.now(),
        love: true
      });
    };

    let first = true;
    onValue(ref(db, 'heart'), (snapshot) => {
      if (snapshot.exists() && !first) {
        showCelebration();
      }
      first = false;
    });
  </script>
</body>
</html>
